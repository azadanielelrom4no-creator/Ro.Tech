<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotech</title>
<style>
body {
font-family: Arial, sans-serif;
margin: 0;
background: #0f172a;
color: white;
}

header {
background: #020617;
padding: 20px;
text-align: center;
font-size: 28px;
font-weight: bold;
}

.hero {
text-align: center;
padding: 60px 20px;
}

.hero h1 {
font-size: 42px;
}

.hero p {
color: #94a3b8;
}

.pricing {
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 20px;
padding: 40px;
}

.card {
background: #020617;
padding: 20px;
border-radius: 10px;
width: 250px;
text-align: center;
}

.price {
font-size: 32px;
margin: 10px 0;
}

button {
background: #3b82f6;
border: none;
padding: 10px 20px;
color: white;
border-radius: 6px;
cursor: pointer;
}

button:hover {
background: #2563eb;
}

footer {
text-align: center;
padding: 20px;
color: #94a3b8;
}
</style>
</head>
<body>

<header>
Rotech
</header>

<section class="hero">
<h1>Professional Roblox Bot Services</h1>
<p>Fast, reliable, and powerful automation tools</p>
</section>

<section class="pricing">

<div class="card">
<h2>Basic</h2>
<div class="price">€15</div>
<p>Essential bot features</p>
<button>Buy</button>
</div>

<div class="card">
<h2>Pro</h2>
<div class="price">€29.99</div>
<p>Advanced automation</p>
<button>Buy</button>
</div>

<div class="card">
<h2>Premium</h2>
<div class="price">€45</div>
<p>Full features and priority support</p>
<button>Buy</button>
</div>

</section>

<footer>
© 2026 Rotech. All rights reserved.
</footer>

</body>
</html>
